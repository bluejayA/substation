site_name: Substation - The Operators Control Room
site_description: OpenStack terminal user interface for modern cloud infrastructure management
site_author: Kevin Carter
site_url: https://github.com/cloudnull/substation
repo_name: substation
repo_url: https://github.com/cloudnull/substation
edit_uri: edit/main/docs/

theme:
  logo: assets/substation-logo-icon-fav.png
  favicon: assets/substation-logo-icon-fav.png
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo: material/cloud
    repo: fontawesome/brands/github

plugins:
  - search:
      separator: '[\s\-\.]+'
  - mermaid2:
      version: 10.6.1

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - footnotes
  - def_list
  - attr_list
  - md_in_html
  - meta

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cloudnull

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Getting Started: getting-started/index.md
  - Installation: installation/index.md
  - Configuration: configuration/index.md

  - Concepts:
    - Features: concepts/features.md
    - Caching System: concepts/caching.md
    - Search Engine: concepts/search.md
    - Security: concepts/security.md
    - Object Storage: concepts/object-storage.md

  - Architecture:
    - Overview: architecture/index.md
    - System Architecture: architecture/overview.md
    - Components: architecture/components.md
    - Technology Stack: architecture/technology-stack.md
    - Object Storage: architecture/object-storage.md

  - Performance:
    - Overview: performance/index.md
    - Performance Details: performance/overview.md
    - Benchmarks: performance/benchmarks.md
    - Tuning: performance/tuning.md
    - Object Storage: performance/object-storage.md
    - Troubleshooting: performance/troubleshooting.md

  - Reference:
    - API Reference:
      - Quick Reference: reference/api/index.md
      - OSClient Library: reference/api/osclient.md
      - SwiftNCurses Framework: reference/api/SwiftNCurses.md
      - Integration Guide: reference/api/integration.md
    - Operators:
      - Keyboard Shortcuts: reference/operators/keyboard-shortcuts.md
      - Common Workflows: reference/operators/workflows.md
    - Developers:
      - Overview: reference/developers/index.md
      - FormBuilder Guide: reference/developers/formbuilder-guide.md
      - FormTextField Guide: reference/developers/formtextfield-guide.md
      - FormSelector Guide: reference/developers/formselector-guide.md
      - StatusListView Guide: reference/developers/statuslistview-guide.md
      - DetailView Guide: reference/developers/detailview-guide.md
      - Testing Guide: reference/developers/testing.md
    - OpenStack Integration:
      - Overview: reference/openstack/index.md
      - Swift: reference/openstack/os-swift.md
    - FAQ: reference/faq.md
    - Troubleshooting: troubleshooting/index.md
